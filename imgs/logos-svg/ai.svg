<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Brain / AI icon -->
  <circle cx="50" cy="50" r="48" fill="#E8F0FE" stroke="#4A90D9" stroke-width="2"/>
  <!-- Neural network nodes -->
  <circle cx="50" cy="20" r="6" fill="#4A90D9"/>
  <circle cx="25" cy="40" r="6" fill="#4A90D9"/>
  <circle cx="75" cy="40" r="6" fill="#4A90D9"/>
  <circle cx="20" cy="65" r="6" fill="#7B61FF"/>
  <circle cx="50" cy="68" r="6" fill="#7B61FF"/>
  <circle cx="80" cy="65" r="6" fill="#7B61FF"/>
  <circle cx="35" cy="85" r="5" fill="#34A853"/>
  <circle cx="65" cy="85" r="5" fill="#34A853"/>
  <!-- Connections -->
  <line x1="50" y1="20" x2="25" y2="40" stroke="#4A90D9" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="20" x2="75" y2="40" stroke="#4A90D9" stroke-width="1.5" opacity="0.6"/>
  <line x1="25" y1="40" x2="20" y2="65" stroke="#7B61FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="25" y1="40" x2="50" y2="68" stroke="#7B61FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="75" y1="40" x2="50" y2="68" stroke="#7B61FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="75" y1="40" x2="80" y2="65" stroke="#7B61FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="65" x2="35" y2="85" stroke="#34A853" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="68" x2="35" y2="85" stroke="#34A853" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="68" x2="65" y2="85" stroke="#34A853" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="65" x2="65" y2="85" stroke="#34A853" stroke-width="1.5" opacity="0.6"/>
  <!-- Cross-connections -->
  <line x1="25" y1="40" x2="75" y2="40" stroke="#4A90D9" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="65" x2="80" y2="65" stroke="#7B61FF" stroke-width="1" opacity="0.3"/>
</svg>
