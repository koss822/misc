server {
    listen 80;
    server_name ram.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ram.local;

    ssl_certificate     /home/YOUR_USERNAME/.certs/ram.local/ram.local.crt;
    ssl_certificate_key /home/YOUR_USERNAME/.certs/ram.local/ram.local.key;

    location / {
        proxy_pass http://127.0.0.1:7777;
        proxy_set_header Host $host;
    }
}
